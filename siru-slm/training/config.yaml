model:
  # meta-llama/Meta-Llama-3-8B needs HF login + Meta accepting your access (403 = not approved yet).
  # Swap to that id once the model page shows you have access.
  base: "Qwen/Qwen2.5-7B-Instruct"
  output_dir: "./siru-dialogue-lora"

lora:
  r: 16
  alpha: 32
  dropout: 0.05
  target_modules:
    - q_proj
    - v_proj
    - k_proj
    - o_proj

# Tuned for ~8GB VRAM (QLoRA 4-bit + ~7B). If OOM: lower max_seq_length first, then batch_size.
training:
  epochs: 3
  learning_rate: 2.0e-4
  batch_size: 1
  gradient_accumulation_steps: 16
  warmup_ratio: 0.03
  max_seq_length: 512
  fp16: true
  logging_steps: 10
  save_steps: 50
  eval_steps: 50

quantization:
  load_in_4bit: true
  bnb_4bit_compute_dtype: "float16"
  bnb_4bit_quant_type: "nf4"
  bnb_4bit_use_double_quant: true

data:
  train_file: "training/train_formatted.jsonl"
  val_file: "training/train_formatted_val.jsonl"
